<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Sohini!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060010;
      min-height: 100vh;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 100% 70% at 50% 35%, #2A0045 0%, #060010 65%);
      z-index: 0;
    }
    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 85%, rgba(220, 0, 100, 0.12) 0%, transparent 45%),
        radial-gradient(circle at 85% 15%, rgba(80, 0, 220, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 50% 100%, rgba(180, 0, 180, 0.08) 0%, transparent 50%);
    }
    /* subtle noise grain */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── FLOATING EMOJIS ── */
    .floaters {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .floater {
      position: absolute;
      animation: floatUp linear forwards;
      opacity: 0;
      user-select: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(105vh) rotate(0deg);   opacity: 0; }
      8%   { opacity: 0.8; }
      92%  { opacity: 0.6; }
      100% { transform: translateY(-8vh) rotate(320deg);  opacity: 0; }
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0.6rem 2rem 1.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      max-width: 700px;
    }

    /* ── TOP LINE ── */
    .top-line {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(220, 160, 210, 0.45);
    }
    .top-line::before, .top-line::after {
      content: '';
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 100, 200, 0.4));
    }
    .top-line::after {
      background: linear-gradient(90deg, rgba(200, 100, 200, 0.4), transparent);
    }

    /* ── EYEBROW BADGE ── */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(90deg, rgba(255,0,110,0.15), rgba(180,0,255,0.15));
      border: 1px solid rgba(255, 80, 180, 0.3);
      color: rgba(255, 180, 230, 0.9);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.38rem 1.1rem;
      border-radius: 999px;
      backdrop-filter: blur(12px);
    }
    .eyebrow-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #FF69B4;
      box-shadow: 0 0 6px #FF69B4;
      animation: blink 1.4s ease-in-out infinite;
    }

    /* ── HAPPY BIRTHDAY LABEL ── */
    .birthday-label {
      font-size: clamp(0.75rem, 2.2vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #C9956C, #F0D8A0, #E8B89A, #F0D8A0, #C9956C);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: goldShine 4s linear infinite;
      margin-top: 0.1rem;
    }
    @keyframes goldShine {
      0%   { background-position: 0% center; }
      100% { background-position: 300% center; }
    }

    /* ── MAIN NAME 3D ── */
    .name-wrap {
      perspective: 700px;
      perspective-origin: 50% 50%;
      position: relative;
      line-height: 1;
    }
    .name {
      font-size: clamp(4rem, 15vw, 9.5rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #FFFFFF;
      line-height: 1;
      display: inline-block;
      transform: rotateX(10deg);
      transform-style: preserve-3d;
      text-shadow:
        0px 1px  0px #FFB3D9,
        0px 3px  0px #FF69B4,
        0px 5px  0px #FF3DAD,
        0px 7px  0px #D900A0,
        0px 9px  0px #B50088,
        0px 11px 0px #920070,
        0px 13px 0px #6F0058,
        0px 15px 0px #4C0040,
        0px 28px 35px rgba(0, 0, 0, 0.65),
        0px 0px  50px rgba(255, 100, 200, 0.2);
      animation: nameFloat 5s ease-in-out infinite;
    }
    @keyframes nameFloat {
      0%, 100% { transform: rotateX(10deg) translateY(0px); }
      50%       { transform: rotateX(10deg) translateY(-8px); }
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      max-width: 340px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 100, 200, 0.35), transparent);
    }

    /* ── TAGLINE ── */
    .tagline {
      font-size: clamp(0.78rem, 1.9vw, 0.95rem);
      color: rgba(220, 180, 230, 0.6);
      max-width: 440px;
      line-height: 1.7;
      font-style: italic;
      letter-spacing: 0.015em;
    }
    .tagline strong {
      color: rgba(255, 210, 240, 0.9);
      font-style: normal;
    }

    /* ── LOVE NOTE ── */
    .love-note {
      font-size: clamp(1.5rem, 4.5vw, 2.4rem);
      font-weight: 400;
      font-family: Georgia, 'Times New Roman', serif;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #F8C8E0, #FFFFFF, #F8C8E0);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: goldShine 5s linear infinite;
      filter: drop-shadow(0 0 18px rgba(255, 150, 200, 0.45));
      margin-top: 0.1rem;
    }

    /* ── PANDAS ── */
    .pandas {
      display: flex;
      align-items: flex-end;
      gap: 1.8rem;
      margin-top: 0.2rem;
    }
    .panda {
      font-size: 3rem;
      display: inline-block;
      transform-origin: bottom center;
    }
    .panda-left {
      animation: danceLeft 0.7s ease-in-out infinite alternate;
    }
    .panda-right {
      animation: danceRight 0.7s ease-in-out infinite alternate;
    }
    @keyframes danceLeft {
      0%   { transform: rotate(-18deg) translateY(0px); }
      100% { transform: rotate(18deg)  translateY(-6px); }
    }
    @keyframes danceRight {
      0%   { transform: rotate(18deg)  translateY(-6px); }
      100% { transform: rotate(-18deg) translateY(0px); }
    }

    /* ── BOTTOM BADGE ── */
    .verdict {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      border: 1px solid rgba(255, 180, 230, 0.18);
      border-radius: 999px;
      padding: 0.45rem 1.4rem;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(220, 180, 220, 0.5);
      backdrop-filter: blur(16px);
      background: rgba(255, 0, 128, 0.05);
      margin-top: 0.1rem;
    }
    .verdict-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255, 105, 180, 0.6);
      box-shadow: 0 0 6px rgba(255, 105, 180, 0.5);
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

  </style>
</head>
<body>

<div class="bg"></div>
<canvas id="stars"></canvas>
<div class="floaters" id="floaters"></div>

<audio id="bgMusic" loop>
  <source src="YTMP3GG_YouTube_Rui-Katla-Ilish-To-Noy-With-Lyrics-Kisho_Media_-CZaCsoQ9tM_009_128k.mp3" type="audio/mpeg">
</audio>

<section class="hero">

  <div class="top-line">For you, always</div>

  <div class="birthday-label">Happy &nbsp; Birthday</div>

  <div class="name-wrap">
    <h1 class="name">Sohini</h1>
  </div>

  <div class="divider"></div>

  <div class="love-note">aalaaabuuuuu &nbsp;♡</div>

  <div class="pandas">
    <span class="panda panda-left">🐼</span>
    <span class="panda panda-right">🐼</span>
  </div>

  <div class="verdict">
    <span class="verdict-dot"></span>
    Warning · may cause uncontrollable smiling
    <span class="verdict-dot"></span>
  </div>

</section>

<script>
  // ── STARS ─────────────────────────────────────────────────
  const sc = document.getElementById('stars');
  const sx = sc.getContext('2d');
  let SW, SH;
  const stars = [];

  function resizeStars() {
    SW = sc.width  = window.innerWidth;
    SH = sc.height = window.innerHeight;
  }
  resizeStars();
  window.addEventListener('resize', resizeStars);

  for (let i = 0; i < 160; i++) {
    stars.push({
      x: Math.random(), y: Math.random(),
      r: 0.4 + Math.random() * 1.4,
      speed: 0.002 + Math.random() * 0.006,
      phase: Math.random() * Math.PI * 2,
      hue: 280 + Math.floor(Math.random() * 60)
    });
  }

  function drawStars(t) {
    sx.clearRect(0, 0, SW, SH);
    for (const s of stars) {
      const alpha = 0.15 + 0.55 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
      sx.beginPath();
      sx.arc(s.x * SW, s.y * SH, s.r, 0, Math.PI * 2);
      sx.fillStyle = `hsla(${s.hue}, 90%, 80%, ${alpha})`;
      sx.fill();
    }
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  // ── FLOATING EMOJIS ───────────────────────────────────────
  const EMOJIS = ['🎉','🎈','💖','✨','🌸','🎀','💝','🌟','💕','🫶','🥂','🌹'];
  const floaters = document.getElementById('floaters');

  function spawnFloater() {
    const el = document.createElement('span');
    el.className = 'floater';
    el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    el.style.left = (4 + Math.random() * 92) + 'vw';
    el.style.fontSize = (0.9 + Math.random() * 1.4) + 'rem';
    el.style.opacity = (0.3 + Math.random() * 0.5).toString();
    const dur = 7 + Math.random() * 9;
    el.style.animationDuration = dur + 's';
    floaters.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000);
  }

  for (let i = 0; i < 12; i++) setTimeout(spawnFloater, i * 350);
  setInterval(spawnFloater, 800);

  // ── BACKGROUND MUSIC ─────────────────────────────────────
  const music = document.getElementById('bgMusic');
  music.volume = 0.6;
  music.currentTime = 5;

  // Try autoplay immediately
  music.play().catch(() => {
    // Browser blocked autoplay — play on first tap/click anywhere
    const unlock = () => {
      music.play();
      document.removeEventListener('click', unlock);
      document.removeEventListener('touchstart', unlock);
    };
    document.addEventListener('click', unlock);
    document.addEventListener('touchstart', unlock);
  });
</script>
</body>
</html>
